apiVersion: v1
kind: Pod
metadata:
  name: probe-demo-pod
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80

      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5

      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 3